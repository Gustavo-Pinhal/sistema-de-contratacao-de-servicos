services:
  ###> Next.js ###
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    networks:
      - app-network
  ###< Next.js ###

  ###> Frontend Repositorio Clonado ###
  frontend_clonado:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../sistema-de-contratacao-de-servicos/frontend:/app
      - /app/node_modules
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
    command: sh -c "npm install && npm run dev -- -p 3002"
    networks:
      - app-network
  ###< Frontend Repositorio Clonado ###

  ###> Frontend Antigo (Legacy) ###
  frontend_old:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend.old:/app
      - frontend_old_node_modules:/app/node_modules
    ports:
      - "5173:5173" # Acesso direto via http://localhost:5173
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - app-network

  ###> Nginx ###
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - mercure
      - seaweed_filer
      - frontend
    networks:
      - app-network
  ###< Nginx ###

  ###> Php ###
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html:z
    env_file: .env
    environment:
      MERCURE_JWT_SECRET: ${MERCURE_JWT_KEY}
      PROM_METRICS_DSN: redis://redis:6379/0?prefix=myapp_metrics
    depends_on:
      - database
      - redis
    networks:
      - app-network
  ###< Php ###

  ###> Redis ###
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
  ###< Redis ###

  ###> Postgres ###
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
    ports: # expõe porta para desenvolvimento
      - "127.0.0.1:5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network
  ###< Postgres ###

  ###> Mercure ###
  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: :80
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_KEY}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_KEY}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins ${CORS_ORIGINS}
    command: /usr/bin/caddy run --config /etc/caddy/dev.Caddyfile
    volumes:
      - mercure_data:/data
      - mercure_config:/config
    networks:
      - app-network
  ###< Mercure ###

  ###> SeaweedFS ###
  seaweed_master:
    image: chrislusf/seaweedfs
    command: "master -ip=seaweed_master"
    volumes:
      - seaweed_master_data:/data
    networks:
      - app-network

  seaweed_volume:
    image: chrislusf/seaweedfs
    command: "volume -mserver=seaweed_master:9333 -port=8080"
    depends_on:
      - seaweed_master
    volumes:
      - seaweed_volume_data:/data
    networks:
      - app-network

  seaweed_filer:
    image: chrislusf/seaweedfs
    command: "filer -master=seaweed_master:9333 -s3"
    ports:
      - "8888:8888" # Dev
      - "8333:8333" # Dev
    depends_on:
      - seaweed_master
      - seaweed_volume
    volumes:
      - seaweed_filer_data:/data
    networks:
      - app-network
  ###< SeaweedFS ###

  ###> Observability ###
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - nginx
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - app-network
  ###< Observability ###

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
  frontend_old_node_modules:
  mercure_data:
  mercure_config:
  seaweed_master_data:
  seaweed_volume_data:
  seaweed_filer_data:
  prometheus_data:
  grafana_data:
  redis_data:
