services:
  ### Postgres
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marido_de_aluguel
      POSTGRES_PASSWORD: password
      POSTGRES_USER: symfony_user
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  ### PHP
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/var/www/html:z
    environment:
      DATABASE_URL: "postgresql://symfony_user:password@database:5432/marido_de_aluguel?serverVersion=16&charset=utf8"

  ### Nginx
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:z
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:Z
    depends_on:
      - php

  ### Mercure
  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: :80 #DEV: O prefixo :80 indica para o Caddy não forçar HTTPS
      MERCURE_PUBLISHER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      MERCURE_SUBSCRIBER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://127.0.0.1:8080
    command: /usr/bin/caddy run --config /etc/caddy/dev.Caddyfile
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost/healthz"]
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "3000:80"
    volumes:
      - mercure_data:/data
      - mercure_config:/config
    
  ### Seaweed FS
  seaweed_master:
    image: chrislusf/seaweedfs
    command: "master -ip=seaweed_master"
    ports:
      - "9333:9333"
    volumes:
      - seaweed_master_data:/data # Persiste metadados do cluster

  seaweed_volume:
    image: chrislusf/seaweedfs
    command: "volume -mserver=seaweed_master:9333 -port=8080 -images.fix.orientation=true"
    depends_on:
      - seaweed_master
    volumes:
      - seaweed_volume_data:/data

  seaweed_filer:
    image: chrislusf/seaweedfs
    command: 'filer -master=seaweed_master:9333 -s3'
    ports:
      - "8333:8333" # Porta que o PHP (S3Client) usa
      - "8888:8888" # Dashboard Web para visualizar arquivos
    depends_on:
      - seaweed_master
      - seaweed_volume
    volumes:
      - seaweed_filer_data:/data

volumes:
  db-data:
  mercure_data:
  mercure_config:
  seaweed_master_data:
  seaweed_volume_data:
  seaweed_filer_data:
