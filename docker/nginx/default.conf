# Upstreams permanecem iguais
upstream php-upstream { server php:9000; }
upstream mercure-upstream { server mercure:80; }
upstream seaweed-upstream { server seaweed_filer:8333; }
upstream frontend-upstream { server frontend:3000; }
upstream legacy-upstream { server frontend_old:5173; }

# --- BLOCO 1: REDIRECIONAMENTO HTTP -> HTTPS ---
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

# --- BLOCO 2: SERVIDOR HTTPS ---
server {
    listen 443 ssl;
    server_name localhost;

    # Caminhos onde o Nginx encontrará os certificados dentro do container
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Otimizações básicas de SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/html/public;

    # Tudo que cair na raiz vai para o Next.js
    location / {
        proxy_pass http://frontend-upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # --- 2. BACKEND API (/api) ---
    location /api {
        try_files $uri /index.php$is_args$args;
    }

    # Processamento PHP
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php-upstream;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    # --- 3. MERCURE (Real-time SSE) ---
    location /.well-known/mercure {
        proxy_pass http://mercure-upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }

    # --- 4. SEAWEEDFS (Storage/Filer) ---
    location /storage/ {
        rewrite ^/storage/(.*)$ /app-public/$1 break;

        proxy_pass http://seaweed-upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        client_max_body_size 100M;
        proxy_buffering off;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}